<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<title>Radost Fan Book</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background: #f5f5f5;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
}

/* CONTAINER */
.scene {
    position: relative;
    width: 400px;
    height: 400px;
    perspective: 2000px;
}

/* PAGE */
.page {
    position: absolute;
    width: 220px;
    height: 300px;
    left: 90px;
    top: 50px;

    background: linear-gradient(135deg, #fffef8, #f3e9d2);
    border-radius: 10px;

    display: flex;
    align-items: center;
    justify-content: center;

    font-family: 'Great Vibes', cursive;
    font-size: 60px;
    color: #333;

    transform-origin: bottom left;
    opacity: 0;

    box-shadow: 0 15px 30px rgba(0,0,0,0.25);
}

/* FAN ANIMATION */
@keyframes fanFlip {
    0% {
        transform: rotate(0deg) rotateY(0deg) skewY(0deg) scale(1);
        opacity: 0;
    }
    20% {
        opacity: 1;
    }
    50% {
        transform: rotate(-25deg) rotateY(-60deg) skewY(8deg) scale(0.95);
    }
    100% {
        transform: rotate(-70deg) rotateY(-180deg) skewY(15deg) scale(0.85);
        opacity: 0;
    }
}

/* MESSAGE */
.message {
    position: absolute;
    width: 100%;
    text-align: center;
    top: 45%;
    font-size: 44px;
    font-family: 'Great Vibes', cursive;
    color: #222;
    opacity: 0;
    transform: scale(0.8);
    transition: all 1s ease;
}

.message.show {
    opacity: 1;
    transform: scale(1);
    filter: drop-shadow(0 0 10px rgba(255,255,255,0.4));
}
    body {
    opacity: 0;
    transition: opacity 0.6s ease-in-out;
}

body.loaded {
    opacity: 1;
}
</style>
</head>

<body>

<div class="scene" id="scene"></div>
<div class="message" id="msg">Честита 30-годишнина, Радост!</div>
<!-- AUDIO ELEMENTS -->
<audio id="tapSound" src="https://assets.mixkit.co/sfx/preview/mixkit-light-paper-page-turn-1073.mp3"></audio>
<audio id="finalSound" src="https://assets.mixkit.co/sfx/preview/mixkit-soft-piano-logo-1359.mp3"></audio>
    
<script>
const scene = document.getElementById("scene");
const msg = document.getElementById("msg");

const tapSound = document.getElementById("tapSound");
const finalSound = document.getElementById("finalSound");

const total = 30;

/* NFC CLEAN RESTART + FADE-IN */
(function () {

    sessionStorage.clear();
    localStorage.clear();

    window.addEventListener("pageshow", function(event) {
        if (event.persisted) location.reload();
    });

    window.addEventListener("load", function() {
        document.body.classList.add("loaded");
    });

})();

/* CREATE PAGES */
for (let i = 1; i <= total; i++) {
    const page = document.createElement("div");
    page.className = "page";
    page.textContent = i;

    page.style.animation = `fanFlip 1.2s ease-in-out forwards`;
    page.style.animationDelay = `${i * 0.08}s`;

    /* 🎬 MOTION BLUR ILLUSION */
    page.style.filter = "blur(0px)";
    page.style.transform += " translateZ(0)";

    scene.appendChild(page);

    /* 📖 PAGE TURN SOUND (staggered) */
    setTimeout(() => {
        tapSound.currentTime = 0;
        tapSound.play();
    }, i * 80);
}

/* 💡 FINAL REVEAL (BLOOM + SOUND) */
setTimeout(() => {

    msg.classList.add("show");

    // bloom effect
    msg.style.textShadow = "0 0 20px rgba(255,255,255,0.6), 0 0 40px rgba(255,215,150,0.4)";

    // soft piano
    finalSound.play();

}, total * 80 + 900);
</script>

</body>
</html>
